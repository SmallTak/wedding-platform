server {
    listen 80;
    server_name photo.shop-hz.top www.photo.shop-hz.top;

    root /home/apps/wedding-platform/web;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://photo.shop-hz.top$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name photo.shop-hz.top www.photo.shop-hz.top;

    ssl_certificate /usr/local/nginx/conf/ssl/photo.shop-hz.top/fullchain.pem;
    ssl_certificate_key /usr/local/nginx/conf/ssl/photo.shop-hz.top/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 300M;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /console {
        return 301 /console/;
    }

    location ^~ /console/ {
        root /home/apps/wedding-platform;
        try_files $uri $uri/ /console/index.html;
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        root /home/apps/wedding-platform/web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
