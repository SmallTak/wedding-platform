spring:
  datasource:
    url: jdbc:h2:file:./data/wedding-platform;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  bootstrap:
    admin:
      enabled: true
      mobile: ${BOOTSTRAP_ADMIN_MOBILE:13800000000}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@123456}
