server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: wedding-server
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 300MB
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      mobile: ${BOOTSTRAP_ADMIN_MOBILE:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  security:
    jwt:
      issuer: wedding-platform
      secret: ${JWT_SECRET:wedding-platform-local-jwt-secret-change-before-production}
      ttl: ${JWT_TTL:PT8H}
    content-access:
      issuer: wedding-platform-public-content
      ttl: ${CONTENT_ACCESS_TTL:PT30M}
  storage:
    root: ${STORAGE_ROOT:./data/storage}
    avatars: avatars
    originals: originals
    previews: previews
    thumbnails: thumbnails
    images:
      preview-max-width: ${IMAGE_PREVIEW_MAX_WIDTH:1920}
      thumbnail-max-width: ${IMAGE_THUMBNAIL_MAX_WIDTH:480}
      watermark-resource: ${IMAGE_WATERMARK_RESOURCE:classpath:/brand/watermark.png}
